<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{% block title %}PayPlan{% endblock %}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f7f7f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }

      .wrapper {
        max-width: 520px;
        margin: 48px auto;
        padding: 0 16px 48px;
      }

      /* Header */
      .header {
        padding: 0 0 32px;
      }

      .logo {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: #1a1a1a;
        text-decoration: none;
      }

      .logo span {
        color: #2563eb;
      }

      /* Card */
      .card {
        background: #ffffff;
        border: 1px solid #e5e5e3;
        border-radius: 12px;
        padding: 40px;
      }

      /* Content blocks */
      .eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #2563eb;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
        color: #1a1a1a;
        line-height: 1.3;
        margin-bottom: 12px;
      }

      .body-text {
        font-size: 15px;
        line-height: 1.6;
        color: #555550;
        margin-bottom: 28px;
      }

      /* Divider */
      .divider {
        border: none;
        border-top: 1px solid #e5e5e3;
        margin: 28px 0;
      }

      /* Footer */
      .footer {
        padding-top: 24px;
        font-size: 12px;
        color: #a3a39e;
        line-height: 1.6;
      }

      .footer a {
        color: #a3a39e;
        text-decoration: underline;
      }
    </style>
    {% block extra_styles %} {% endblock %}
  </head>
  <body>
    <div class="wrapper">
      <div class="header">
        <a href="{{ frontend_url }}" class="logo">Pay<span>Plan</span></a>
      </div>

      <div class="card">{% block content %}{% endblock %}</div>

      <div class="footer">
        {% block footer %}
        <p>You received this email because you have a PayPlan account.</p>
        <p style="margin-top: 6px">
          &copy; {{ year }} PayPlan &nbsp;&middot;&nbsp;
          <a href="{{ frontend_url }}/privacy">Privacy</a>
        </p>
        {% endblock %}
      </div>
    </div>
  </body>
</html>
